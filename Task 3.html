<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Tic Tac Toe</title>
    <style>
      :root {
        --bg: #f0f2f5;
        --card: #fff;
        --accent: #2b7a78;
        --x: #ff6b6b;
        --o: #4d96ff;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          "Helvetica Neue",
          Arial;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .app {
        background: var(--card);
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 6px 20px rgba(15, 15, 15, 0.08);
        width: 340px;
      }
      h1 {
        margin: 0 0 12px;
        font-size: 18px;
        text-align: center;
        color: #222;
      }
      .controls {
        display: flex;
        gap: 8px;
        justify-content: center;
        margin-bottom: 12px;
      }
      .btn {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #e6e9ee;
        background: #fff;
        cursor: pointer;
        font-weight: 600;
      }
      .btn.active {
        background: var(--accent);
        color: #fff;
        border-color: transparent;
      }
      .status {
        text-align: center;
        margin-bottom: 12px;
        color: #333;
      }
      .board {
        display: grid;
        grid-template-columns: repeat(3, 100px);
        gap: 8px;
        justify-content: center;
      }
      .cell {
        width: 100px;
        height: 100px;
        background: #fafafa;
        border-radius: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 48px;
        cursor: pointer;
        user-select: none;
        border: 1px dashed #eee;
      }
      .cell.x {
        color: var(--x);
      }
      .cell.o {
        color: var(--o);
      }
      .footer {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-top: 12px;
      }
      .small {
        font-size: 13px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div class="app" role="application">
      <h1>Tic Tac Toe</h1>
      <div class="controls">
        <button id="pvp" class="btn active">2 Players</button>
        <button id="pvc" class="btn">Play vs AI</button>
      </div>
      <div class="status" id="status">X's turn</div>
      <div class="board" id="board" aria-label="tic tac toe board"></div>
      <div class="footer">
        <button id="reset" class="btn">Reset</button>
        <div class="small">First: X</div>
      </div>
    </div>

    <script>
      (() => {
        const boardEl = document.getElementById("board");
        const statusEl = document.getElementById("status");
        const pvpBtn = document.getElementById("pvp");
        const pvcBtn = document.getElementById("pvc");
        const resetBtn = document.getElementById("reset");

        let cells = Array(9).fill(null);
        let current = "X";
        let active = true;
        let vsAI = false;

        const wins = [
          [0, 1, 2],
          [3, 4, 5],
          [6, 7, 8],
          [0, 3, 6],
          [1, 4, 7],
          [2, 5, 8],
          [0, 4, 8],
          [2, 4, 6],
        ];

        function render() {
          boardEl.innerHTML = "";
          for (let i = 0; i < 9; i++) {
            const div = document.createElement("div");
            div.className = "cell";
            div.dataset.index = i;
            if (cells[i]) div.classList.add(cells[i].toLowerCase());
            div.textContent = cells[i] || "";
            div.addEventListener("click", onCellClick);
            boardEl.appendChild(div);
          }
          statusEl.textContent = active
            ? `${current}'s turn`
            : statusEl.textContent;
        }

        function onCellClick(e) {
          const i = Number(e.currentTarget.dataset.index);
          if (!active || cells[i]) return;
          makeMove(i, current);
          if (active && vsAI && current === "O") setTimeout(aiTurn, 200);
        }

        function makeMove(i, player) {
          cells[i] = player;
          const winner = checkWinner();
          if (winner) {
            active = false;
            statusEl.textContent =
              winner === "draw" ? "Draw!" : `${winner} wins!`;
          } else {
            current = current === "X" ? "O" : "X";
            statusEl.textContent = `${current}'s turn`;
          }
          render();
        }

        function checkWinner() {
          for (const [a, b, c] of wins) {
            if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c])
              return cells[a];
          }
          if (cells.every(Boolean)) return "draw";
          return null;
        }

        function reset() {
          cells = Array(9).fill(null);
          current = "X";
          active = true;
          statusEl.textContent = `${current}'s turn`;
          render();
          if (vsAI && current === "O") setTimeout(aiTurn, 200);
        }

        function aiTurn() {
          if (!active) return;
          const i = bestMove();
          makeMove(i, "O");
        }

        // simple heuristic AI: win -> block -> center -> corner -> side
        function bestMove() {
          const ai = "O",
            pl = "X";
          // try win
          for (let i = 0; i < 9; i++)
            if (!cells[i]) {
              cells[i] = ai;
              if (checkWinner() === ai) {
                cells[i] = null;
                return i;
              }
              cells[i] = null;
            }
          // try block
          for (let i = 0; i < 9; i++)
            if (!cells[i]) {
              cells[i] = pl;
              if (checkWinner() === pl) {
                cells[i] = null;
                return i;
              }
              cells[i] = null;
            }
          if (!cells[4]) return 4;
          const corners = [0, 2, 6, 8].filter((i) => !cells[i]);
          if (corners.length)
            return corners[Math.floor(Math.random() * corners.length)];
          const sides = [1, 3, 5, 7].filter((i) => !cells[i]);
          return sides.length
            ? sides[Math.floor(Math.random() * sides.length)]
            : 0;
        }

        pvpBtn.addEventListener("click", () => {
          vsAI = false;
          pvpBtn.classList.add("active");
          pvcBtn.classList.remove("active");
          reset();
        });
        pvcBtn.addEventListener("click", () => {
          vsAI = true;
          pvcBtn.classList.add("active");
          pvpBtn.classList.remove("active");
          reset();
        });

        resetBtn.addEventListener("click", reset);

        render();
      })();
    </script>
  </body>
</html>
